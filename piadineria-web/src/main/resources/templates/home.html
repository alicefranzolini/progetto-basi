<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Piadineria da Linda</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>
 
<div class="container">
    <h1>Accedi</h1>
 
    <div class="form-wrapper">
        <p th:if="${msg}"    th:text="${msg}"    class="msg-ok"></p>
        <p th:if="${errore}" th:text="${errore}" class="msg-err"></p>
 
        <form method="post" action="/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="la-tua@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="ruolo">Accedi come</label>
                <select id="ruolo" name="ruolo">
                    <option value="UTENTE">Utente</option>
                    <option value="FATTORINO">Fattorino</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button type="submit" style="width:100%;justify-content:center;margin-top:8px;">Entra</button>
        </form>
 
        <p style="text-align:center;margin-top:20px;font-size:.9rem;color:#888;">
            Non hai un account? <a href="/registrazione">Registrati qui</a>
        </p>
    </div>
</div>
</body>
</html>
