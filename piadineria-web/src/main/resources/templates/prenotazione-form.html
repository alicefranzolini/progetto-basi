<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prenota un tavolo - Piadineria da Linda</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>

<div class="container">
    <h1>Prenota un tavolo</h1>

    <div class="form-wrapper">
        <form method="post" action="/prenotazioni">
            <div class="form-group">
                <label for="data">Data</label>
                <input type="date" id="data" name="data" required>
            </div>
            <div class="form-group">
                <label for="ora">Ora</label>
                <input type="time" id="ora" name="ora" required>
            </div>
            <div class="form-group">
                <label for="persone">Numero di persone</label>
                <input type="number" id="persone" name="persone" min="1" placeholder="2" required>
            </div>
            <div class="form-group">
                <label for="note">Note (opzionale)</label>
                <input type="text" id="note" name="note" placeholder="Allergie, richieste speciali...">
            </div>
            <button type="submit" style="width:100%;justify-content:center;margin-top:8px;">📅 Prenota</button>
        </form>
    </div>
</div>
</body>
</html>
