<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Feedback ordine - Piadineria da Linda</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>

<div class="container">
    <h1>Lascia un feedback sull'ordine</h1>

    <div class="form-wrapper">
        <form th:action="@{'/feedback/ordine/' + ${servizioId}}" method="post">
            <div class="form-group">
                <label for="voto">Voto (1–5)</label>
                <input type="number" id="voto" name="voto" min="1" max="5" placeholder="5" required>
            </div>
            <div class="form-group">
                <label for="commento">Commento</label>
                <input type="text" id="commento" name="commento" placeholder="Ottimo servizio!">
            </div>
            <button type="submit" style="width:100%;justify-content:center;margin-top:8px;">⭐ Invia feedback</button>
        </form>
    </div>
</div>
</body>
</html>
