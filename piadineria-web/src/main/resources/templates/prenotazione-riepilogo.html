<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prenotazione effettuata - Piadineria da Linda</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>

<div class="container">
    <h1>Prenotazione effettuata! 🎉</h1>

    <div class="card" style="max-width:480px;">
        <h2>Riepilogo</h2>
        <table>
            <tbody>
                <tr><td><strong>ID</strong></td><td th:text="${prenotazione.id}"></td></tr>
                <tr><td><strong>Data</strong></td><td th:text="${prenotazione.data}"></td></tr>
                <tr><td><strong>Ora</strong></td><td th:text="${prenotazione.ora}"></td></tr>
                <tr><td><strong>Persone</strong></td><td th:text="${prenotazione.persone}"></td></tr>
                <tr>
                    <td><strong>Tavolo</strong></td>
                    <td>
                        <span th:if="${prenotazione.tavolo != null}" th:text="'Tavolo ' + ${prenotazione.tavolo.numero}"></span>
                        <span th:if="${prenotazione.tavolo == null}">Da assegnare</span>
                    </td>
                </tr>
                <tr><td><strong>Stato</strong></td><td th:text="${prenotazione.stato}"></td></tr>
            </tbody>
        </table>
        <div style="margin-top:20px;">
            <a class="button" href="/prenotazioni/mie">Le mie prenotazioni</a>
        </div>
    </div>
</div>
</body>
</html>
