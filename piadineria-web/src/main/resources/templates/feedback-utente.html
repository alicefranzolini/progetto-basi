<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>I miei feedback - Piadineria da Linda</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>

<div class="container">
    <h1>I miei feedback</h1>

    <div class="card">
        <table>
            <thead>
                <tr><th>ID</th><th>Voto</th><th>Commento</th><th>Tipo</th></tr>
            </thead>
            <tbody>
                <tr th:each="f : ${feedback}">
                    <td th:text="${f.id}"></td>
                    <td th:text="${f.voto}"></td>
                    <td th:text="${f.commento}"></td>
                    <td>
                        <span th:if="${f.servizio != null}">Ordine</span>
                        <span th:if="${f.prenotazione != null}">Prenotazione</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
