<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>I miei ordini - Piadineria da Linda</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>
 
<div class="container">
    <h1>I miei ordini</h1>
 
    <div class="card">
        <table>
            <thead>
                <tr><th>ID</th><th>Data</th><th>Tipo</th><th>Totale</th></tr>
            </thead>
            <tbody>
                <tr th:each="o : ${ordini}">
                    <td th:text="${o.id}"></td>
                    <td th:text="${o.dataCreazione}"></td>
                    <td th:text="${o.tipo}"></td>
                    <td th:text="${o.totale} + ' €'"></td>
                </tr>
            </tbody>
        </table>
    </div>
 
    <a href="/menu">← Torna al menù</a>
</div>
</body>
</html>
